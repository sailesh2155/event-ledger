services:

  account-service:
    build:
      context: .
      dockerfile: account-service/Dockerfile
    container_name: account-service
    # Deliberately NOT published to the host: the Account Service is
    # internal-only and reachable solely on the compose network.
    # Uncomment for local debugging:
    # ports:
    #   - "8081:8081"
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8081/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  event-gateway:
    build:
      context: .
      dockerfile: event-gateway/Dockerfile
    container_name: event-gateway
    ports:
      - "8080:8080"
    environment:
      ACCOUNT_SERVICE_URL: http://account-service:8081
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/health"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s
    # No depends_on(account-service) on purpose: the Gateway is designed to
    # start and serve reads even when the Account Service is unavailable
    # (graceful degradation requirement).
